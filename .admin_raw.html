<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Empostor Admin</title>
    <style>
        :root {
            --bg: #0d1117;
            --s: #161b22;
            --b: #30363d;
            --t: #e6edf3;
            --m: #7d8590;
            --a: #2f81f7;
            --r: #f85149
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--t);
            font: 14px/1.5 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .card {
            background: var(--s);
            border: 1px solid var(--b);
            border-radius: 12px;
            padding: 36px 40px;
            width: 340px
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px
        }

        h1 svg {
            color: var(--a);
            flex-shrink: 0
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--m);
            margin-bottom: 5px
        }

        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--b);
            border-radius: 6px;
            color: var(--t);
            padding: 9px 12px;
            font-size: 14px;
            outline: none;
            margin-bottom: 14px
        }

        input:focus {
            border-color: var(--a)
        }

        button {
            width: 100%;
            background: var(--a);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer
        }

        button:hover {
            opacity: .88
        }
    </style>
</head>

<body>
    <div class="card">
        <h1><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span data-i18n="login.title">Empostor Admin</span></h1>
        <form method="POST" action="/admin/login"><label data-i18n="login.password">Password</label><input type="password" name="password"
                autofocus data-i18n-placeholder="login.placeholder" placeholder="Enter admin password"><button type="submit" data-i18n="login.signin">Sign in</button><!--ERR--></form>
    </div>
    <script>
        fetch('/api/admin/strings').then(r => r.json()).then(s => {
            document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (s[k]) el.textContent = s[k]; });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k = el.getAttribute('data-i18n-placeholder'); if (s[k]) el.placeholder = s[k]; });
        }).catch(() => {});
    </script>
</body>

</html>
